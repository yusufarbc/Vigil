name: CI / CD

# ─────────────────────────────────────────────────────────────────────────────
# Branch strategy (CLAUDE.md §7, ADR-011):
#   test  — integration branch; all feature work merges here first.
#           Runs lint → test → SAST → SCA → build → image scan.
#           No image push; no deploy.
#   main  — release branch; only promoted from test via PR.
#           Runs the full pipeline AND pushes images to Artifact Registry.
#
# Required GitHub secrets (set before first push to main):
#   GCP_PROJECT           — GCP project ID
#   WIF_PROVIDER          — Workload Identity Federation provider resource name
#   WIF_SERVICE_ACCOUNT   — GitHub Actions GSA (roles/artifactregistry.writer)
#
# LLM is ALWAYS mocked in CI — billed API is never called (CLAUDE.md §7).
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, test]
  pull_request:
    branches: [main, test]

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.12"
  LLM_PROVIDER: mock   # never call the billed API in CI

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Lint (fast-fail; blocks all downstream stages)
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  go-lint:
    name: "Lint · Go · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [detection-service, alert-gateway, case-service, bff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/${{ matrix.service }}

  python-lint:
    name: "Lint · Python · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service: [enrichment-service, masking-service, llm-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: ruff check + format
        working-directory: services/${{ matrix.service }}
        run: |
          ruff check .
          ruff format --check .

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Unit tests
# ─────────────────────────────────────────────────────────────────────────────

  go-test:
    name: "Test · Go · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [go-lint]
    strategy:
      matrix:
        service: [detection-service, alert-gateway, case-service, bff]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: go test -race
        working-directory: services/${{ matrix.service }}
        run: go test ./... -race -count=1

  python-test:
    name: "Test · Python · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [python-lint]
    strategy:
      matrix:
        service: [enrichment-service, masking-service, llm-orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install with dev extras
        working-directory: services/${{ matrix.service }}
        run: pip install --no-cache-dir ".[dev]" 2>/dev/null || pip install --no-cache-dir .
      - name: pytest
        working-directory: services/${{ matrix.service }}
        env:
          LLM_PROVIDER: mock
        run: python -m pytest tests/ -v

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 3 — SAST + SCA (parallel; no upstream test dependency so CI stays fast)
# ─────────────────────────────────────────────────────────────────────────────

  codeql:
    name: "SAST · CodeQL · ${{ matrix.language }}"
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [go, python]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    name: "SCA · Dependency Review"
    runs-on: ubuntu-latest
    # Only meaningful on PRs — compares diff against base branch
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Container build + image vulnerability scan (Trivy)
#           Builds once; uploads tar artifact for reuse by scan + push stages.
# ─────────────────────────────────────────────────────────────────────────────

  docker-build:
    name: "Build · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [go-test, python-test]
    strategy:
      matrix:
        service:
          - detection-service
          - alert-gateway
          - enrichment-service
          - masking-service
          - llm-orchestrator
          - case-service
          - bff
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: sentinel/${{ matrix.service }}:ci
          # Export as tar so scan + push stages can reuse without rebuilding
          outputs: type=docker,dest=/tmp/${{ matrix.service }}.tar
      - name: Cache image tar
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/${{ matrix.service }}.tar
          retention-days: 1

  trivy-scan:
    name: "Scan · Trivy · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      security-events: write
    strategy:
      matrix:
        service:
          - detection-service
          - alert-gateway
          - enrichment-service
          - masking-service
          - llm-orchestrator
          - case-service
          - bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/
      - run: docker load -i /tmp/${{ matrix.service }}.tar
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: sentinel/${{ matrix.service }}:ci
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"   # fail pipeline on HIGH/CRITICAL CVEs
      - name: Upload Trivy SARIF to Security tab
        if: always()      # upload even when scan exits non-zero
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 5 — Push to Artifact Registry (main branch merges only)
#           Requires GCP_PROJECT, WIF_PROVIDER, WIF_SERVICE_ACCOUNT secrets.
#           Uses Workload Identity Federation — no long-lived service-account keys.
# ─────────────────────────────────────────────────────────────────────────────

  docker-push:
    name: "Push · ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [trivy-scan, codeql]
    # Only run after a PR merge into main — never on the test branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    strategy:
      matrix:
        service:
          - detection-service
          - alert-gateway
          - enrichment-service
          - masking-service
          - llm-orchestrator
          - case-service
          - bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.service }}
          path: /tmp/
      - run: docker load -i /tmp/${{ matrix.service }}.tar
      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
      - name: Tag and push
        env:
          REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/sentinel
        run: |
          docker tag sentinel/${{ matrix.service }}:ci \
            $REGISTRY/${{ matrix.service }}:${{ github.sha }}
          docker tag sentinel/${{ matrix.service }}:ci \
            $REGISTRY/${{ matrix.service }}:latest
          docker push $REGISTRY/${{ matrix.service }}:${{ github.sha }}
          docker push $REGISTRY/${{ matrix.service }}:latest
